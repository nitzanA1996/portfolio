<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Hunt</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
  <script type="module" src="gamePlay.js" defer></script>
</head>
<body>
  <button type="button" id="lang-toggle" class="lang-btn">עברית / Hebrew</button>
  <header class="title">
    <h1 data-i18n="title">Word Hunt generator</h1>
  </header>
  <main>
    <section class="form-section">
      <form id='table-setting'>
        <h2 data-i18n="semi-title">generate your own Word Hunt game</h2>
        <fieldset>
          <legend data-i18n="table-size">Table size</legend>
          <br>
          <input type="number" id="rows" name="rows" data-i18n-placeholder="rowsPlaceholder" placeholder="number of rows">
          <span>/</span>
          <input type="number" id="columns" name="columns"placeholder="columns of table">
        </fieldset>

        <fieldset class="words-picking">
          <header>
            <h3 data-i18n="hidden-words-title">Hidden words</h3>
            <h4  data-i18n="hidden-words-semititle"class="semi-titel">choose your own words or generate random ones</h4>
            <span id="warning_Select_size" class="warning_Select_size">*Select a board size before proceeding.</span>
          </header>
          <div class="create-words">
            <div class="choose-word">
              <input type="text" id="user-word" name="user-word">
              <button type="button" id="add-word" disabled>add word</button>
              <span id="word-error" aria-live=polite>*unvalid input: plaese use English letters only</span>
            </div> <br>
            <label for="Random-word">add a random name of flower</label>
            <button type="button" id="Random-word" disabled>press</button>
          </div>

          <footer>
            <ul class="words-list">

            </ul>
            <button type="submit">create table</button>
          </footer>
        </fieldset>
      </form>
    </section>

    <dialog class="board-section" id="game-dialog">
      <div class="game-container">
        <aside class="game-sidebar">
          <h3>Words to find:</h3>
          <ul id="game-words-list"></ul>
        </aside>

        <div class="game-board"></div>
      </div>
    </dialog>
    
    <dialog id="victory-dialog">
      <div class="victory-content">
        <h2>🎉 congrats! 🎉</h2>
        <p>you found all expressions!</p>
        <button id="play-again-btn">play Agin</button>
      </div>
    </dialog>
  </main>
</body>
</html>
