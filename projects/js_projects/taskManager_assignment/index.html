<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header> 
    <h1>Task Manager</h1> 
  </header>

<main class="dashboard-layout">
  <div class="input-card">
    <div class="input-labels">
      <label for="task-input">Input</label>
      <label for="task-date">Due:</label>
      <label for="task-priority">Priority</label>
      <span></span> </div>
    
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add new task..."> 
      <input type="date" id="task-date">
      <select id="task-priority" class="priority-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
      </select>
      <button id="add-task-Btn">+ Add Task</button>
    </div>
  </div>  

  <div class="controls-section">
    <div class="filters-section">
        <button data-filter="all" class="active">All</button>
        <button data-filter="active">Active</button> 
        <button data-filter="completed">Completed</button>
    </div>
    
    <div class="sort-section">
      <select id="sort-select" class="sort-dropdown">
        <option value="dueDate" selected>Sort by: Due Date</option>
        <option value="creationDate">Sort by: Creation Date</option>
        <option value="priority">Sort by: Priority</option>
      </select>
    </div>
  </div>

  <ul id="task-list" class="task-grid">
    
  </ul>
</main>
  

  <footer>
    <p>Built by Nitzan Aloni | © 2026 All rights reserved</p>
  </footer>
</body>
</html>
